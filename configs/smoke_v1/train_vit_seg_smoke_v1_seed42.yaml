# Smoke test override config for the v1 ViT segmentation baseline.
# This file is intentionally minimal and only overrides smoke-related knobs.

base_config: "configs/baseline_v1/train_vit_seg_baseline_v1_seed42.yaml"

experiment:
  run_name: "smoke_v1_seed42"
  seed: 42

data:
  manifest_path: "outputs/train_runs/smoke_v1_seed42/manifests/smoke_tiles_manifest.csv"

loader:
  batch_size: 4
  eval_batch_size: 4
  num_workers: 2
  persistent_workers: false

train:
  max_epochs: 2
  amp: true
  log_every_n_steps: 5
  val_every_n_epochs: 1
  early_stopping_patience: 99

output:
  run_subdir: "smoke_v1_seed42"

smoke:
  subset_seed: 42
  source_manifest_path: "data/processed/vit_dataset/v1/manifests/tiles_manifest.csv"
  subset_manifest_path: "outputs/train_runs/smoke_v1_seed42/manifests/smoke_tiles_manifest.csv"
  split_counts:
    train: 256
    val: 64
    test_in_domain: 32
    test_eco_holdout: 16


