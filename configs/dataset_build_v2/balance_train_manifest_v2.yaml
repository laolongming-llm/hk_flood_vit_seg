input_manifest: data/processed/vit_dataset/v2/manifests/tiles_manifest.csv
output_manifest: data/processed/vit_dataset/v2/manifests/tiles_manifest_balanced_train.csv
report_dir: data/processed/vit_dataset/v2/manifests/reports_balanced

num_classes: 10
method: auto_sqrt_inverse_freq
target_train_ratio: 1.6
min_multiplier: 1.0
max_multiplier: 4.0
weight_floor: 0.5
