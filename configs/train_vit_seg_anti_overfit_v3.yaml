# 防过拟合第三轮配置（基于 baseline 继承）
# 目标：在 v2 的基础上进一步“稳曲线”，让验证指标波动更可控。
#
# 关键思路：
# 1) 降低基础学习率 + 拉长 warmup，减小参数更新抖动；
# 2) 使用梯度累积，提升等效 batch，降低小批量噪声；
# 3) 适度提升正则（dropout / weight_decay / label_smoothing）；
# 4) 降低增强扰动强度，避免“过强增强 + 小样本”带来的验证震荡。
base_config: "configs/train_vit_seg_baseline_v1.yaml"

experiment:
  name: "vit_seg_anti_overfit_v3"
  run_name: "vit_seg_anti_overfit_v3_seed42"

data:
  augmentation:
    enabled: true
    # 空间增强保留，但略低于 v2，减少几何扰动带来的训练不稳定。
    hflip_prob: 0.5
    vflip_prob: 0.5
    rot90_prob: 0.3
    # 光谱增强继续保留，强度下调，优先“稳态泛化”。
    color_jitter_prob: 0.25
    brightness_delta: 0.06
    contrast_delta: 0.06
    channel_scale_prob: 0.15
    channel_scale_delta: 0.04
    # 噪声增强进一步减弱，避免边界细节被过度扰动。
    gaussian_noise_prob: 0.08
    gaussian_noise_std: 0.008

model:
  # 相比 v2(0.15) 略增，进一步抑制后期记忆化。
  dropout: 0.18

optimizer:
  # 降低学习率，换取更平滑的验证曲线。
  lr: 0.00007
  # 略增权重衰减，配合较低 lr 抑制过拟合。
  weight_decay: 0.025

scheduler:
  # 拉长 warmup，减小前几轮参数震荡。
  warmup_epochs: 5
  # 使用更线性的衰减，避免中后期学习率下降过慢。
  power: 1.0
  # 适度抬高下限，避免后期学习率过低导致“无效抖动”。
  min_lr: 0.000003

loss:
  # 稍强于 v2(0.02)，弱于 v1(0.05)。
  label_smoothing: 0.03

train:
  # 将最大 epoch 维持在 40，结合早停控制总时长。
  max_epochs: 40
  # 放宽耐心值，给中后期小幅反弹留空间。
  early_stopping_patience: 10
  # 梯度累积提升等效 batch（2x），常用于降低小 batch 噪声。
  grad_accum_steps: 2
  # 略收紧梯度裁剪，减少偶发大梯度更新。
  grad_clip_norm: 0.7
